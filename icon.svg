<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <mask id="moon">
      <circle cx="220" cy="262" r="142" fill="white"/>
      <circle cx="288" cy="214" r="117" fill="black"/>
    </mask>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Moon -->
  <g filter="url(#glow)">
    <circle cx="220" cy="262" r="142" fill="white" opacity="0.95" mask="url(#moon)"/>
  </g>

  <!-- Stars -->
  <g filter="url(#glow)">
    <!-- Large sparkle top-right -->
    <g transform="translate(372,142)">
      <path d="M0,-20 L4,-4 L20,0 L4,4 L0,20 L-4,4 L-20,0 L-4,-4 Z" fill="white" opacity="0.92"/>
    </g>
    <!-- Medium sparkle right -->
    <g transform="translate(408,282)">
      <path d="M0,-12 L2.2,-2.2 L12,0 L2.2,2.2 L0,12 L-2.2,2.2 L-12,0 L-2.2,-2.2 Z" fill="white" opacity="0.72"/>
    </g>
    <!-- Small sparkle left -->
    <g transform="translate(148,155)">
      <path d="M0,-9 L1.7,-1.7 L9,0 L1.7,1.7 L0,9 L-1.7,1.7 L-9,0 L-1.7,-1.7 Z" fill="white" opacity="0.60"/>
    </g>
  </g>

  <!-- Tiny dots -->
  <circle cx="325" cy="106" r="5" fill="white" opacity="0.50"/>
  <circle cx="372" cy="334" r="4.5" fill="white" opacity="0.38"/>
  <circle cx="148" cy="365" r="3.5" fill="white" opacity="0.32"/>
</svg>
